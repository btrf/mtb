name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: android

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: android
        env:
          STORE_PW: ${{ secrets.STORE_PW }}
          KEY_PW: ${{ secrets.KEY_PW }}

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk mtb-service-${{ github.ref_name }}.apk
        working-directory: android

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/mtb-service-${{ github.ref_name }}.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Bundle app
        run: node build.js

      - name: Generate SEA blob
        run: node --experimental-sea-config sea-config.json

      - name: Inject blob into node.exe
        shell: cmd
        run: |
          copy /Y "%ProgramFiles%\nodejs\node.exe" MTB_Service.exe
          npx postject MTB_Service.exe NODE_SEA_BLOB sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 --overwrite

      - name: Rename and upload EXE
        run: move MTB_Service.exe mtb-service-${{ github.ref_name }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: mtb-service-${{ github.ref_name }}.exe

  create-release:
    needs: [build-apk, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apk/mtb-service-*.apk
            exe/mtb-service-*.exe
          name: MTB Service ${{ github.ref_name }}
